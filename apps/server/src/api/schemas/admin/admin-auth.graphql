type Query {
	me: AuthenticatedAdminUser
}

type Mutation {
	"""
	Authenticates an admin user using the provided authentication strategy name and data
	"""
	authenticateAdminUser(input: AuthenticationInput!, rememberMe: Boolean): AuthenticateAdminUserResult!
	"""
	Terminates the current admin user session
	"""
	logoutAdminUser: Success!
}

union AuthenticateAdminUserResult = AuthenticatedAdminUser | InvalidCredentialsError

type AuthenticatedAdminUser implements AuthenticatedUser {
	id: ID!
	identifier: String!
	marketplaceRegions: [AdminUserMarketplaceRegion!]!
}

type AdminUserMarketplaceRegion {
	id: ID!
	token: String!
	code: String!
	permissions: [Permission!]!
}
