services:
  postgres_db:
    image: postgres:16-alpine
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    ports:
      - "6543:5432"
    environment:
      POSTGRES_DB: matjar
      POSTGRES_USER: matjar
      POSTGRES_PASSWORD: matjar
    labels:
      - "io.matjar.create.name=matjar"

volumes:
  postgres_db_data:
    driver: local
    labels:
      - "io.matjar.create.name=matjar"
