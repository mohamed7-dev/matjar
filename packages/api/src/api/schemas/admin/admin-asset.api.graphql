type Query {
	"Get single asset by id"
	asset(id: ID!): Asset
	"Get a list of assets"
	assets(options: AssetListOptions): AssetList!
}

type Mutation {
	"Create new assets"
	createAssets(input: [CreateAssetsInput!]!): [CreateAssetsResult!]!
	"Update asset"
	updateAsset(input: UpdateAssetInput!): Asset!
	"Delete assets"
	deleteAssets(input: DeleteAssetsInput!): DeletionResponse!
	"Delete asset"
	deleteAsset(input: DeleteAssetInput!): DeletionResponse!
	"Assign assets to marketplace region"
	assignAssetsToMarketplace(input: AssignAssetsToMarketplaceInput!): [Asset!]!
}

input CreateAssetsInput {
	file: Upload!
	translations: [AssetTranslationInput!]
	tags: [String!]
}

input AssetTranslationInput {
	id: ID
	languageCode: LanguageCode!
	name: String
}

type InvalidMimetypeError implements ApiError {
	errorCode: ErrorCode!
	message: String!
	fileName: String!
	mimeType: String!
}

union CreateAssetsResult = Asset | InvalidMimetypeError

input UpdateAssetInput {
	id: ID!
	name: String
	focalPoint: CoordinateInput
	translations: [AssetTranslationInput!]
	tags: [String!]
}

input CoordinateInput {
	x: Float!
	y: Float!
}

input DeleteAssetsInput {
	ids: [ID!]!
	deleteFromAllMarketplaces: Boolean
	force: Boolean
}

input AssignAssetsToMarketplaceInput {
	assetIds: [ID!]!
	marketplaceId: ID!
}

input DeleteAssetInput {
	id: ID!
	deleteFromAllMarketplaces: Boolean
	force: Boolean
}

# generated by generateListOptions function
input AssetListOptions {
	tags: [String!]
	tagsOperator: FilterGroupOperator
}
